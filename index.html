<script>
  // Filet de sécurité : affiche toute erreur directement sur la page, sans outils de développement.
  window.__appRendered = false;
  function showFatalError(title, detail) {
    if (window.__appRendered) { console.warn(title, detail); return; }
    var el = document.getElementById("boot-status");
    if (!el) return;
    el.innerHTML =
      '<div style="font-size:32px;margin-bottom:10px;">⚠️</div>' +
      '<div style="font-size:15px;font-weight:bold;margin-bottom:6px;">' + title + '</div>' +
      '<div style="font-size:12px;color:#8A8070;margin-bottom:4px;">Faites une capture d\'écran de ce message et envoyez-la à Claude.</div>' +
      '<div class="err">' + (detail || "") + '</div>' +
      '<button onclick="location.reload()">Réessayer</button>';
  }
  window.addEventListener("error", function(e) {
    showFatalError("Erreur JavaScript", (e.error && e.error.stack) ? e.error.stack : e.message);
  });
  window.addEventListener("unhandledrejection", function(e) {
    showFatalError("Erreur asynchrone", e.reason ? String(e.reason.stack || e.reason) : "inconnue");
  });
  // Si rien n'a chargé après 12 secondes, on le signale (connexion lente / CDN bloqué).
  setTimeout(function() {
    if (!window.__appRendered && !window.__appErrored) {
      showFatalError("Le chargement prend trop de temps", "Les bibliothèques React n'ont pas pu se charger à temps. Vérifiez votre connexion internet, puis appuyez sur Réessayer.");
    }
  }, 12000);
</script>

const generateQuizQuestions = () => {
  const questions = [];
  const mots = DB.mots;
  for (let i = 0; i < mots.length; i++) {
    const correct = mots[i];
    const others = mots.filter((_, idx) => idx !== i).sort(() => Math.random() - 0.5).slice(0, 3);
    const options = [...others.map(m => m.definition), correct.definition].sort(() => Math.random() - 0.5);
    questions.push({ type:"definition", question:`Quelle est la définition de « ${correct.mot} » ?`, options, answer: correct.definition, mot: correct.mot });
    if (correct.synonymes.length > 0) {
      const syn = correct.synonymes[0];
      const wrongSyns = mots.filter((_, idx) => idx !== i && mots[idx].synonymes.length > 0).sort(() => Math.random() - 0.5).slice(0, 3).map(m => m.synonymes[0] || m.mot);
      const synOptions = [...wrongSyns, syn].sort(() => Math.random() - 0.5);
      questions.push({ type:"synonyme", question:`Quel est un synonyme de « ${correct.mot} » ?`, options: synOptions, answer: syn, mot: correct.mot });
    }
  }
  return questions.sort(() => Math.random() - 0.5).slice(0, 20);
};

const speak = (text, slow = false) => {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "fr-FR";
  utterance.rate = slow ? 0.6 : 0.9;
  utterance.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const frVoice = voices.find(v => v.lang.startsWith("fr"));
  if (frVoice) utterance.voice = frVoice;
  window.speechSynthesis.speak(utterance);
};

    heart_empty: <svg width={size} height={size} fill="none" stroke={color} strokeWidth="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
  };
  return icons[name] || null;
};

function App() {
  const [tab, setTab] = useState("accueil");
  const [dark, setDark] = useState(() => load("dark", true));
  const [favoris, setFavoris] = useState(() => load("favoris", []));
  const [progress, setProgress] = useState(() => load("progress", { xp: 0, niveau: 1, serie: 0, motsVus: [], quizTotal: 0, quizBons: 0 }));
  const [quizState, setQuizState] = useState({ questions: [], idx: 0, score: 0, done: false, selected: null });
  const [searchQuery, setSearchQuery] = useState("");
  const [aiInput, setAiInput] = useState("");
  const [aiOutput, setAiOutput] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [aiMode, setAiMode] = useState("reformuler");
  const [motDuJour, setMotDuJour] = useState([]);
  const [expDuJour, setExpDuJour] = useState([]);
  const [citationDuJour, setCitationDuJour] = useState(null);
  const [expandedMot, setExpandedMot] = useState(null);
  const [quizStarted, setQuizStarted] = useState(false);
  const [notification, setNotification] = useState(null);

  const G = "#C9A84C";
  const GL = "#E8C872";
  const p = {
    bg: dark ? "#0A0E1A" : "#F8F5EF",
    surface: dark ? "#111827" : "#FFFFFF",
    surface2: dark ? "#1A2233" : "#F0EDE6",
    gold: G, goldLight: GL,
    text: dark ? "#EDE8DC" : "#1A1410",
    textMuted: dark ? "#8A8070" : "#7A7060",
    border: dark ? "#2A3040" : "#DDD8CE",
    success: "#4CAF7D",
    error: "#E05C5C",
  };

  useEffect(() => {
    const d = Math.floor(Date.now() / 86400000);
    const si = (d % 4) * 5;
    setMotDuJour(DB.mots.slice(si, si + 5).length >= 5 ? DB.mots.slice(si, si + 5) : DB.mots.slice(0, 5));
    const ei = (d % 3) * 3;
    setExpDuJour(DB.expressions.slice(ei, ei + 3).length >= 3 ? DB.expressions.slice(ei, ei + 3) : DB.expressions.slice(0, 3));
    setCitationDuJour(DB.citations[d % DB.citations.length]);
  }, []);

  useEffect(() => { save("dark", dark); }, [dark]);
  useEffect(() => { save("favoris", favoris); }, [favoris]);
  useEffect(() => { save("progress", progress); }, [progress]);

  const showNotif = (msg) => { setNotification(msg); setTimeout(() => setNotification(null), 2500); };

  const toggleFavori = (id) => {
    const isFav = favoris.includes(id);
    setFavoris(prev => isFav ? prev.filter(f => f !== id) : [...prev, id]);
    showNotif(isFav ? "Retiré des favoris" : "Ajouté aux favoris ✦");
  };

  const marquerVu = (id) => {
    if (!progress.motsVus.includes(id)) {
      setProgress(prev => ({ ...prev, xp: prev.xp + 10, motsVus: [...prev.motsVus, id], niveau: Math.floor((prev.xp + 10) / 100) + 1 }));
      showNotif("+10 XP — Nouveau mot maîtrisé ✦");
    }
  };

  const startQuiz = () => {
    setQuizState({ questions: generateQuizQuestions(), idx: 0, score: 0, done: false, selected: null });
    setQuizStarted(true);
  };

  const answerQuiz = (option) => {
    const q = quizState.questions[quizState.idx];
    const correct = option === q.answer;
    setQuizState(prev => ({ ...prev, selected: option }));
    setTimeout(() => {
      const newScore = correct ? quizState.score + 1 : quizState.score;
      setProgress(prev => ({ ...prev, xp: prev.xp + (correct ? 15 : 0), niveau: Math.floor((prev.xp + (correct ? 15 : 0)) / 100) + 1, quizTotal: prev.quizTotal + 1, quizBons: prev.quizBons + (correct ? 1 : 0) }));
      if (quizState.idx + 1 >= quizState.questions.length) {
        setQuizState(prev => ({ ...prev, score: newScore, done: true, selected: null }));
      } else {
        setQuizState(prev => ({ ...prev, idx: prev.idx + 1, score: newScore, selected: null }));
      }
    }, 900);
  };

  const callAI = async () => {
    if (!aiInput.trim()) return;
    setAiLoading(true);
    setAiOutput("");
    const prompts = {
      reformuler: `Tu es un expert en éloquence du français soutenu. Reformule cette phrase en français académique et élégant. Propose 2 versions numérotées. Sois concis. Phrase : "${aiInput}"`,
      definir: `Définis ce mot en français soutenu : définition claire, niveau de langue, 3 synonymes élégants, 1 exemple remarquable. Mot : "${aiInput}"`,
      debat: `Propose 3 formules soutenues pour introduire cet argument dans un débat académique. Argument : "${aiInput}"`,
    };
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompts[aiMode] }] })
      });
      const data = await res.json();
      setAiOutput(data.content?.map(b => b.text || "").join("") || "Erreur.");
    } catch {
      setAiOutput("Connexion requise pour l'assistant IA.");
    }
    setAiLoading(false);
  };

  const filteredMots = DB.mots.filter(m =>
    m.mot.toLowerCase().includes(searchQuery.toLowerCase()) ||
    m.definition.toLowerCase().includes(searchQuery.toLowerCase()) ||
    m.synonymes.some(s => s.toLowerCase().includes(searchQuery.toLowerCase()))
  );

  const css = `
    * { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shimmer { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .anim { animation: fadeIn 0.35s ease forwards; }
    .shim { animation: shimmer 1.4s infinite; }
    input, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: ${p.border}; border-radius: 2px; }
  `;

  return (
    <div style={{ minHeight:"100vh", background:p.bg, color:p.text, maxWidth:480, margin:"0 auto", fontFamily:"'Georgia','Times New Roman',serif", position:"relative" }}>
      <style>{css}</style>

      {notification && (
        <div style={{ position:"fixed", top:16, left:"50%", transform:"translateX(-50%)", background:p.gold, color:"#000", padding:"9px 18px", borderRadius:20, fontFamily:"sans-serif", fontSize:13, fontWeight:600, zIndex:9999, boxShadow:"0 4px 20px rgba(0,0,0,0.4)", animation:"fadeIn 0.3s ease", whiteSpace:"nowrap" }}>
          {notification}
        </div>
      )}

      {/* HEADER */}
      <div style={{ background:p.surface, borderBottom:`1px solid ${p.border}`, padding:"14px 16px", position:"sticky", top:0, zIndex:100, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ color:p.gold, fontSize:9, letterSpacing:3, fontFamily:"sans-serif", textTransform:"uppercase", marginBottom:2 }}>Académie du Langage</div>
          <div style={{ fontSize:16, fontWeight:"bold", letterSpacing:0.5 }}>Maîtrise du Français</div>
        </div>
        <div style={{ display:"flex", gap:10, alignItems:"center" }}>
          <div style={{ background:p.surface2, border:`1px solid ${p.gold}50`, borderRadius:12, padding:"4px 10px", display:"flex", alignItems:"center", gap:5 }}>
            <span style={{ color:p.gold, fontSize:13 }}>✦</span>
            <span style={{ color:p.gold, fontFamily:"sans-serif", fontSize:13, fontWeight:700 }}>{progress.xp} XP</span>
          </div>
          <button onClick={() => setDark(d => !d)} style={{ background:"none", border:`1px solid ${p.border}`, borderRadius:8, padding:6, cursor:"pointer" }}>
            <Icon name={dark?"sun":"moon"} size={15} color={p.textMuted} />
          </button>
        </div>
      </div>

      <div style={{ paddingBottom:80 }}>

        {/* ── ACCUEIL ── */}
        {tab === "accueil" && (
          <div className="anim">
            {citationDuJour && (
              <div style={{ margin:"16px 14px 0", background:`linear-gradient(135deg,${p.surface},${p.surface2})`, border:`1px solid ${p.gold}40`, borderLeft:`3px solid ${p.gold}`, borderRadius:12, padding:"14px 16px" }}>
                <div style={{ color:p.gold, fontSize:9, letterSpacing:2, fontFamily:"sans-serif", marginBottom:7, textTransform:"uppercase" }}>✦ Citation du Jour</div>
                <div style={{ fontSize:14, lineHeight:1.65, fontStyle:"italic" }}>« {citationDuJour.texte} »</div>
                <div style={{ marginTop:7, color:p.textMuted, fontFamily:"sans-serif", fontSize:11 }}>— {citationDuJour.auteur}</div>
              </div>
            )}

            <div style={{ margin:"14px 14px 0", background:p.surface, border:`1px solid ${p.border}`, borderRadius:12, padding:"14px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{ fontFamily:"sans-serif", fontSize:12, color:p.textMuted }}>Niveau {progress.niveau}</span>
                <span style={{ fontFamily:"sans-serif", fontSize:11, color:p.gold }}>{progress.xp % 100}/100 XP</span>
              </div>
              <div style={{ background:p.surface2, borderRadius:4, height:5, overflow:"hidden", marginBottom:12 }}>
                <div style={{ background:`linear-gradient(90deg,${p.gold},${p.goldLight})`, width:`${progress.xp % 100}%`, height:"100%", borderRadius:4, transition:"width 0.5s" }} />
              </div>
              <div style={{ display:"flex", gap:8, fontFamily:"sans-serif" }}>
                {[{ v:progress.motsVus.length, l:"Mots appris" }, { v:`${progress.quizBons}/${progress.quizTotal}`, l:"Quiz réussis" }, { v:favoris.length, l:"Favoris" }].map((s,i) => (
                  <div key={i} style={{ flex:1, textAlign:"center" }}>
                    {i > 0 && <div style={{ position:"absolute" }} />}
                    <div style={{ fontSize:18, fontWeight:700, color:p.gold }}>{s.v}</div>
                    <div style={{ fontSize:10, color:p.textMuted }}>{s.l}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ margin:"18px 14px 0" }}>
              <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:11 }}>
                <span style={{ color:p.gold }}>✦</span>
                <span style={{ fontSize:15, fontWeight:"bold" }}>Mots du Jour</span>
                <span style={{ background:p.gold, color:"#000", fontSize:10, padding:"2px 7px", borderRadius:10, fontFamily:"sans-serif", fontWeight:700 }}>{motDuJour.length}</span>
              </div>
              {motDuJour.map((mot, i) => (
                <MotCard key={mot.id} mot={mot} p={p} expanded={expandedMot === mot.id} onToggle={() => { setExpandedMot(expandedMot===mot.id?null:mot.id); marquerVu(mot.id); }} onFavori={() => toggleFavori(mot.id)} isFavori={favoris.includes(mot.id)} />
              ))}
            </div>

            <div style={{ margin:"18px 14px 0" }}>
              <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:11 }}>
                <span style={{ color:p.gold }}>❧</span>
                <span style={{ fontSize:15, fontWeight:"bold" }}>Expressions Soutenues</span>
              </div>
              {expDuJour.map((exp) => (
                <div key={exp.id} style={{ background:p.surface, border:`1px solid ${p.border}`, borderRadius:12, padding:"13px 14px", marginBottom:10 }} className="anim">
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div style={{ flex:1 }}>
                      <div style={{ color:p.gold, fontStyle:"italic", fontSize:15, marginBottom:2 }}>« {exp.expression} »</div>
                      <div style={{ color:p.textMuted, fontFamily:"sans-serif", fontSize:11, marginBottom:6 }}>{exp.categorie}</div>
                      <div style={{ fontSize:13, lineHeight:1.5 }}>{exp.definition}</div>
                      <div style={{ color:p.textMuted, fontStyle:"italic", fontSize:12, marginTop:7, borderLeft:`2px solid ${p.gold}`, paddingLeft:8, lineHeight:1.5 }}>{exp.exemple}</div>
                    </div>
                    <button onClick={() => speak(exp.expression + ". " + exp.exemple)} style={{ background:"none", border:"none", cursor:"pointer", padding:"0 0 0 10px" }}>
                      <Icon name="volume" size={17} color={p.gold} />
                    </button>
                  </div>
                </div>
              ))}
            </div>

            <div style={{ margin:"18px 14px 0" }}>
              <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:11 }}>
                <span style={{ color:p.gold }}>⟡</span>
                <span style={{ fontSize:15, fontWeight:"bold" }}>Connecteurs Logiques</span>
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                {DB.connecteurs.map((c,i) => (
                  <button key={i} onClick={() => speak(c.connecteur+". "+c.exemple)} style={{ background:p.surface2, border:`1px solid ${p.border}`, borderRadius:20, padding:"5px 13px", cursor:"pointer" }}>
                    <span style={{ color:p.gold, fontStyle:"italic", fontSize:13 }}>{c.connecteur}</span>
                    <span style={{ color:p.textMuted, fontFamily:"sans-serif", fontSize:10, marginLeft:5 }}>— {c.usage}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── DICTIONNAIRE ── */}
        {tab === "dictionnaire" && (
          <div className="anim" style={{ padding:14 }}>
            <div style={{ fontSize:15, fontWeight:"bold", marginBottom:12 }}>Dictionnaire Soutenu</div>
            <div style={{ position:"relative", marginBottom:13 }}>
              <div style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)" }}><Icon name="search" size={15} color={p.textMuted} /></div>
              <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Rechercher un mot, synonyme..." style={{ width:"100%", background:p.surface, border:`1px solid ${p.border}`, borderRadius:10, padding:"10px 11px 10px 36px", color:p.text, fontFamily:"sans-serif", fontSize:14, outline:"none" }} />
            </div>
            <div style={{ fontFamily:"sans-serif", fontSize:11, color:p.textMuted, marginBottom:11 }}>{filteredMots.length} mot{filteredMots.length!==1?"s":""} trouvé{filteredMots.length!==1?"s":""}</div>
            {filteredMots.map(mot => (
              <MotCard key={mot.id} mot={mot} p={p} expanded={expandedMot===mot.id} onToggle={() => setExpandedMot(expandedMot===mot.id?null:mot.id)} onFavori={() => toggleFavori(mot.id)} isFavori={favoris.includes(mot.id)} />
            ))}
          </div>
        )}

        {/* ── QUIZ ── */}
        {tab === "quiz" && (
          <div className="anim" style={{ padding:14 }}>
            {!quizStarted ? (
              <div>
                <div style={{ fontSize:15, fontWeight:"bold", marginBottom:4 }}>Quiz d'Éloquence</div>
                <div style={{ color:p.textMuted, fontFamily:"sans-serif", fontSize:13, marginBottom:16 }}>Testez votre maîtrise du vocabulaire soutenu</div>
                <div style={{ background:p.surface, border:`1px solid ${p.border}`, borderRadius:14, padding:"18px", marginBottom:14, textAlign:"center" }}>
                  <div style={{ fontSize:38, marginBottom:8 }}>🎓</div>
                  <div style={{ fontSize:22, fontWeight:700, color:p.gold }}>{progress.quizBons}</div>
                  <div style={{ fontFamily:"sans-serif", fontSize:12, color:p.textMuted }}>bonnes réponses · Taux : {progress.quizTotal>0 ? Math.round((progress.quizBons/progress.quizTotal)*100) : 0}%</div>
                </div>
                <div style={{ background:p.surface2, border:`1px solid ${p.border}`, borderRadius:12, padding:"13px 14px", marginBottom:18 }}>
                  {["Définitions & synonymes","20 questions par session","+15 XP par bonne réponse","Difficulté adaptative"].map((item,i) => (
                    <div key={i} style={{ display:"flex", gap:8, alignItems:"center", marginBottom:7, fontFamily:"sans-serif", fontSize:13 }}>
                      <Icon name="check" size={13} color={p.gold} />{item}
                    </div>
                  ))}
                </div>
                <button onClick={startQuiz} style={{ width:"100%", background:`linear-gradient(135deg,${p.gold},${p.goldLight})`, border:"none", borderRadius:12, padding:"14px", cursor:"pointer", fontSize:15, fontWeight:700, color:"#0A0E1A" }}>
                  Commencer le Quiz ✦
                </button>
              </div>
            ) : quizState.done ? (
              <div style={{ textAlign:"center", paddingTop:20 }} className="anim">
                <div style={{ fontSize:48, marginBottom:10 }}>{quizState.score>=15?"🏆":quizState.score>=10?"🎓":"📚"}</div>
                <div style={{ fontSize:24, fontWeight:700, color:p.gold, marginBottom:5 }}>{quizState.score}/{quizState.questions.length}</div>
                <div style={{ color:p.textMuted, fontFamily:"sans-serif", fontSize:13, marginBottom:3 }}>
                  {quizState.score>=15?"Éloquence remarquable !":quizState.score>=10?"Bonne maîtrise !":"Continuez votre apprentissage"}
                </div>
                <div style={{ color:p.gold, fontFamily:"sans-serif", fontSize:12, marginBottom:26 }}>+{quizState.score*15} XP gagnés</div>
                <div style={{ display:"flex", gap:10 }}>
                  <button onClick={() => setQuizStarted(false)} style={{ flex:1, background:p.surface2, border:`1px solid ${p.border}`, borderRadius:10, padding:12, cursor:"pointer", color:p.text, fontFamily:"sans-serif" }}>Accueil</button>
                  <button onClick={startQuiz} style={{ flex:1, background:`linear-gradient(135deg,${p.gold},${p.goldLight})`, border:"none", borderRadius:10, padding:12, cursor:"pointer", color:"#000", fontFamily:"sans-serif", fontWeight:700 }}>Rejouer ✦</button>
                </div>
              </div>
            ) : (
              <div className="anim" key={quizState.idx}>
                <div style={{ display:"flex", justifyContent:"space-between", marginBottom:14 }}>
                  <span style={{ fontFamily:"sans-serif", fontSize:12, color:p.textMuted }}>Question {quizState.idx+1}/{quizState.questions.length}</span>
                  <span style={{ fontFamily:"sans-serif", fontSize:12, color:p.gold }}>Score : {quizState.score}</span>
                </div>
                <div style={{ background:p.surface2, borderRadius:4, height:4, marginBottom:18 }}>
                  <div style={{ background:p.gold, height:"100%", borderRadius:4, width:`${(quizState.idx/quizState.questions.length)*100}%`, transition:"width 0.3s" }} />
                </div>
                <div style={{ background:p.surface, border:`1px solid ${p.border}`, borderRadius:12, padding:"16px", marginBottom:14 }}>
                  <div style={{ color:p.gold, fontSize:9, letterSpacing:2, fontFamily:"sans-serif", marginBottom:7, textTransform:"uppercase" }}>
                    {quizState.questions[quizState.idx]?.type==="synonyme"?"Synonyme":"Définition"}
                  </div>
                  <div style={{ fontSize:15, lineHeight:1.5 }}>{quizState.questions[quizState.idx]?.question}</div>
                </div>
                {quizState.questions[quizState.idx]?.options.map((opt,i) => {
                  const sel = quizState.selected === opt;
                  const isAns = opt === quizState.questions[quizState.idx]?.answer;
                  const show = quizState.selected !== null;
                  return (
                    <button key={i} onClick={() => !quizState.selected && answerQuiz(opt)} style={{ width:"100%", background: show&&isAns?"#1a3a2a": show&&sel&&!isAns?"#3a1a1a":p.surface, border:`1px solid ${show&&isAns?p.success: show&&sel&&!isAns?p.error:p.border}`, borderRadius:10, padding:"12px 14px", marginBottom:9, cursor:quizState.selected?"default":"pointer", textAlign:"left", color:p.text, fontSize:13, lineHeight:1.4, display:"flex", justifyContent:"space-between", alignItems:"center", transition:"all 0.2s" }}>
                      <span style={{ flex:1 }}>{opt}</span>
                      {show&&isAns&&<Icon name="check" size={15} color={p.success} />}
                      {show&&sel&&!isAns&&<Icon name="x" size={15} color={p.error} />}
                    </button>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ── ÉLOQUENCE IA ── */}
        {tab === "eloquence" && (
          <div className="anim" style={{ padding:14 }}>
            <div style={{ fontSize:15, fontWeight:"bold", marginBottom:3 }}>Assistant d'Éloquence</div>
            <div style={{ color:p.textMuted, fontFamily:"sans-serif", fontSize:12, marginBottom:14 }}>Propulsé par Claude AI · Parlez comme un intellectuel</div>
            <div style={{ display:"flex", gap:7, marginBottom:14 }}>
              {[{k:"reformuler",l:"Reformuler"},{k:"definir",l:"Définir"},{k:"debat",l:"Débat"}].map(m => (
                <button key={m.k} onClick={() => setAiMode(m.k)} style={{ flex:1, background:aiMode===m.k?p.gold:p.surface2, border:`1px solid ${aiMode===m.k?p.gold:p.border}`, borderRadius:8, padding:"9px 4px", cursor:"pointer", color:aiMode===m.k?"#000":p.text, fontFamily:"sans-serif", fontSize:12, fontWeight:aiMode===m.k?700:400 }}>
                  {m.l}
                </button>
              ))}
            </div>
            <div style={{ background:p.surface2, border:`1px solid ${p.border}`, borderRadius:9, padding:"9px 12px", marginBottom:12, fontFamily:"sans-serif", fontSize:11, color:p.textMuted, lineHeight:1.5 }}>
              {aiMode==="reformuler"&&"✦ Entrez une phrase simple — reformulation en français soutenu"}
              {aiMode==="definir"&&"✦ Entrez un mot ou expression — définition académique complète"}
              {aiMode==="debat"&&"✦ Entrez un argument — formules éloquentes pour exposés et débats"}
            </div>
            <textarea value={aiInput} onChange={e => setAiInput(e.target.value)} placeholder={aiMode==="reformuler"?"Ex: Je pense que c'est pas bien...":aiMode==="definir"?"Ex: Épistémique":"Ex: La liberté est essentielle"} rows={3} style={{ width:"100%", background:p.surface, border:`1px solid ${p.border}`, borderRadius:10, padding:"11px", color:p.text, fontSize:14, resize:"none", outline:"none", marginBottom:11, lineHeight:1.5 }} />
            <button onClick={callAI} disabled={aiLoading||!aiInput.trim()} style={{ width:"100%", background:aiLoading?p.surface2:`linear-gradient(135deg,${p.gold},${p.goldLight})`, border:"none", borderRadius:10, padding:"13px", cursor:aiLoading?"default":"pointer", color:aiLoading?p.textMuted:"#000", fontFamily:"sans-serif", fontSize:14, fontWeight:700, marginBottom:14 }} className={aiLoading?"shim":""}>
              {aiLoading?"L'IA réfléchit...":"✦ Transformer avec l'IA"}
            </button>
            {aiOutput && (
              <div className="anim" style={{ background:p.surface, border:`1px solid ${p.gold}40`, borderLeft:`3px solid ${p.gold}`, borderRadius:12, padding:"14px" }}>
                <div style={{ color:p.gold, fontSize:9, letterSpacing:2, fontFamily:"sans-serif", marginBottom:9, textTransform:"uppercase" }}>✦ Réponse</div>
                <div style={{ fontSize:14, lineHeight:1.7, whiteSpace:"pre-wrap" }}>{aiOutput}</div>
                <button onClick={() => speak(aiOutput)} style={{ marginTop:11, background:"none", border:`1px solid ${p.border}`, borderRadius:8, padding:"6px 13px", cursor:"pointer", color:p.gold, fontFamily:"sans-serif", fontSize:12, display:"flex", alignItems:"center", gap:6 }}>
                  <Icon name="volume" size={13} color={p.gold} />Écouter
                </button>
              </div>
            )}
          </div>
        )}

        {/* ── FAVORIS ── */}
        {tab === "favoris" && (
          <div className="anim" style={{ padding:14 }}>
            <div style={{ fontSize:15, fontWeight:"bold", marginBottom:3 }}>Mes Favoris</div>
            <div style={{ color:p.textMuted, fontFamily:"sans-serif", fontSize:12, marginBottom:14 }}>{favoris.length} mot{favoris.length!==1?"s":""} sauvegardé{favoris.length!==1?"s":""}</div>
            {favoris.length===0 ? (
              <div style={{ textAlign:"center", padding:"40px 20px" }}>
                <div style={{ fontSize:36, marginBottom:10, color:p.gold }}>✦</div>
                <div style={{ color:p.textMuted, fontFamily:"sans-serif", fontSize:13 }}>Aucun favori.<br/>Appuyez sur ♡ sur un mot pour le sauvegarder.</div>
              </div>
            ) : DB.mots.filter(m => favoris.includes(m.id)).map(mot => (
              <MotCard key={mot.id} mot={mot} p={p} expanded={expandedMot===mot.id} onToggle={() => setExpandedMot(expandedMot===mot.id?null:mot.id)} onFavori={() => toggleFavori(mot.id)} isFavori={true} />
            ))}
          </div>
        )}

      </div>

      {/* NAV */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:p.surface, borderTop:`1px solid ${p.border}`, display:"flex", zIndex:100 }}>
        {[{k:"accueil",i:"home",l:"Accueil"},{k:"dictionnaire",i:"book",l:"Dico"},{k:"quiz",i:"quiz",l:"Quiz"},{k:"eloquence",i:"ai",l:"IA"},{k:"favoris",i:"heart_empty",l:"Favoris"}].map(t => (
          <button key={t.k} onClick={() => setTab(t.k)} style={{ flex:1, background:"none", border:"none", padding:"9px 0", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
            <Icon name={t.k==="favoris"?(tab==="favoris"?"heart_full":"heart_empty"):t.i} size={19} color={tab===t.k?p.gold:p.textMuted} />
            <span style={{ fontFamily:"sans-serif", fontSize:9, color:tab===t.k?p.gold:p.textMuted, letterSpacing:0.5, fontWeight:tab===t.k?700:400 }}>{t.l.toUpperCase()}</span>
            {tab===t.k&&<div style={{ width:18, height:2, background:p.gold, borderRadius:1 }} />}
          </button>
        ))}
      </div>
    </div>
  );
}

function MotCard({ mot, p, expanded, onToggle, onFavori, isFavori }) {
  return (
    <div style={{ background:p.surface, border:`1px solid ${expanded?p.gold+"60":p.border}`, borderRadius:12, marginBottom:9, overflow:"hidden", transition:"border-color 0.2s" }} className="anim">
      <div onClick={onToggle} style={{ padding:"13px 14px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
            <span style={{ fontSize:16, fontWeight:"bold" }}>{mot.mot}</span>
            <span style={{ color:p.textMuted, fontSize:11, fontFamily:"sans-serif" }}>{mot.phonetique}</span>
          </div>
          <div style={{ display:"flex", gap:5, marginTop:5, flexWrap:"wrap" }}>
            <span style={{ background:p.gold+"20", color:p.gold, fontSize:10, padding:"2px 7px", borderRadius:8, fontFamily:"sans-serif" }}>{mot.categorie}</span>
            <span style={{ background:p.surface2, color:p.textMuted, fontSize:10, padding:"2px 7px", borderRadius:8, fontFamily:"sans-serif" }}>{mot.niveau}</span>
            <span style={{ background:p.surface2, color:p.textMuted, fontSize:10, padding:"2px 7px", borderRadius:8, fontFamily:"sans-serif" }}>{mot.theme}</span>
          </div>
        </div>
        <div style={{ display:"flex", gap:7, alignItems:"center" }}>
          <button onClick={e => { e.stopPropagation(); onFavori(); }} style={{ background:"none", border:"none", cursor:"pointer", padding:4 }}>
            <Icon name={isFavori?"heart_full":"heart_empty"} size={16} color={isFavori?p.gold:p.textMuted} />
          </button>
          <button onClick={e => { e.stopPropagation(); speak(mot.mot+". "+mot.definition); }} style={{ background:"none", border:"none", cursor:"pointer", padding:4 }}>
            <Icon name="volume" size={16} color={p.gold} />
          </button>
          <span style={{ color:p.textMuted, fontSize:16, transform:expanded?"rotate(180deg)":"none", transition:"transform 0.2s", display:"inline-block", lineHeight:1 }}>⌄</span>
        </div>
      </div>
      {expanded && (
        <div style={{ padding:"0 14px 14px", borderTop:`1px solid ${p.border}` }} className="anim">
          <div style={{ marginTop:11, fontSize:14, lineHeight:1.6 }}>{mot.definition}</div>
          <div style={{ marginTop:11, background:p.surface2, borderRadius:8, padding:"9px 11px", borderLeft:`2px solid ${p.gold}` }}>
            <div style={{ fontSize:9, color:p.gold, fontFamily:"sans-serif", letterSpacing:1, marginBottom:4, textTransform:"uppercase" }}>Exemple</div>
            <div style={{ fontSize:13, fontStyle:"italic", lineHeight:1.5 }}>« {mot.exemple} »</div>
          </div>
          {mot.synonymes.length>0&&(
            <div style={{ marginTop:9 }}>
              <div style={{ fontSize:9, color:p.textMuted, fontFamily:"sans-serif", letterSpacing:1, marginBottom:5, textTransform:"uppercase" }}>Synonymes</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                {mot.synonymes.map((s,i) => <span key={i} style={{ background:"#1a3a2a", color:"#4CAF7D", fontSize:11, padding:"2px 9px", borderRadius:7, fontFamily:"sans-serif" }}>{s}</span>)}
              </div>
            </div>
          )}
          {mot.antonymes.length>0&&(
            <div style={{ marginTop:9 }}>
              <div style={{ fontSize:9, color:p.textMuted, fontFamily:"sans-serif", letterSpacing:1, marginBottom:5, textTransform:"uppercase" }}>Antonymes</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                {mot.antonymes.map((a,i) => <span key={i} style={{ background:"#3a1a1a", color:"#E05C5C", fontSize:11, padding:"2px 9px", borderRadius:7, fontFamily:"sans-serif" }}>{a}</span>)}
              </div>
            </div>
          )}
          {mot.contexte&&(
            <div style={{ marginTop:9, fontSize:11, color:p.textMuted, fontStyle:"italic", fontFamily:"sans-serif", lineHeight:1.5, borderTop:`1px solid ${p.border}`, paddingTop:7 }}>⟡ {mot.contexte}</div>
          )}
          <div style={{ display:"flex", gap:7, marginTop:11 }}>
            {[{l:"Normal",s:false},{l:"Lent",s:true},{l:"Exemple",e:true}].map((b,i) => (
              <button key={i} onClick={() => speak(b.e?mot.exemple:mot.mot, b.s)} style={{ flex:1, background:p.surface2, border:`1px solid ${p.border}`, borderRadius:8, padding:"7px 3px", cursor:"pointer", color:i===0?p.gold:p.textMuted, fontFamily:"sans-serif", fontSize:11, display:"flex", alignItems:"center", justifyContent:"center", gap:4 }}>
                <Icon name="volume" size={12} color={i===0?p.gold:p.textMuted} />{b.l}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
window.__appRendered = true;
</script>

<script>
(function() {
  try {
    if (typeof React === "undefined" || typeof ReactDOM === "undefined" || typeof Babel === "undefined") {
      // Une des bibliothèques n'a pas chargé ; le message d'erreur a déjà été affiché par onerror.
      return;
    }
    var source = document.getElementById("app-source").textContent;
    var transformed = Babel.transform(source, { presets: ["react"] }).code;
    var script = document.createElement("script");
    script.text = transformed;
    document.body.appendChild(script);
  } catch (e) {
    window.__appErrored = true;
    showFatalError("Erreur de syntaxe dans l'application", (e && e.message) ? e.message : String(e));
  }
})();
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js").catch((err) => {
      console.warn("Échec de l'enregistrement du service worker :", err);
    });
  });
}
</script>

</body>
</html>
